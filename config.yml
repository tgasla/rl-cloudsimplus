# train_model_dir: applicable only if mode == [transfer|test]
# globals.java_log_destination: [none, stdout, file, stdout-file] - if file, logs are written to a file, if stdout-file, logs are written to both stdout and a file
# globals.junit_output_show: [true, false] - if true, junit test results are printed to stdout
# globals.java_log_level: [TRACE, DEBUG, INFO, WARNING, ERROR]
# seed: random or any integer
# base_log_dir: parent directory for all logs
# experiment_type_dir: parent directory for a set of experiments
# experiment_name: name of the experiment
# mode: [train, test, transfer]
# vm_allocation_policy: [rl, rule-based]
# algorithm: [any stable-baselines3 algorithm if vm_allocation_policy == rl, minimize-queue, minimize-allocated, minimize-unutilized if vm_allocation_policy == rule-based]

# globals.run_mode: [batch, serial]

# if you make any changes in java_log_leve, java_log_destination or java_output_show, 
#  you need to execute make build-gateway for the changes to take effect
globals:
    attached: true
    gpu: true
    java_log_level: INFO
    java_log_destination: none
    junit_output_show: false
    run_mode: serial

common:
  seed: 1234
  timestep_interval: 1.0
  max_episode_length: 100
  split_large_jobs: true
  clear_created_lists: true
  vm_startup_delay: 0.0
  vm_shutdown_delay: 0.0
  datacenters:
    - !datacenter
      name: cloud_dc
      type: cloud
      amount: 1
      hosts:
        - !host
          amount: 16
          pes: 64
          pe_mips: 60000
          ram: 65536
          storage: 4000000
          bw: 100000
          vms:
            - !vm
              amount: 8
              pes: 8
              pe_mips: 60000
              ram: 8192
              size: 64000
              bw: 10000
    - !datacenter
      name: edge_dc_ireland
      type: edge
      amount: 1
      hosts:
        - !host
            amount: 8
            pes: 16
            pe_mips: 60000
            ram: 65536
            storage: 2000000
            bw: 10000
            vms:
              !vm
                amount: 4
                pes: 4
                pe_mips: 60000
                ram: 2048
                size: 8000
                bw: 1000
    - !datacenter
        name: micro_dc_ucd
        type: micro
        amount: 1
        hosts:
          - !host
              amount: 3
              pes: 6
              pe_mips: 60000
              ram: 65536
              storage: 1000000
              bw: 1000
              vms:
                - !vm
                  amount: 3
                  pes: 2
                  pe_mips: 60000
                  ram: 1024
                  size: 4000
                  bw: 1000
    - !datacenter
        name: micro_dc_dcu
        type: micro
        amount: 1
        hosts:
          - !host
              amount: 2
              pes: 6
              pe_mips: 60000
              ram: 65536
              storage: 1000000
              bw: 1000
              vms:
                - !vm
                  amount: 3
                  pes: 2
                  pe_mips: 60000
                  ram: 1024
                  size: 4000
                  bw: 1000
    - !datacenter
        name: micro_dc_eur
        type: micro
        amount: 1
        hosts:
          - !host
              amount: 3
              pes: 6
              pe_mips: 60000
              ram: 65536
              storage: 1000000
              bw: 1000
              vms:
                - !vm
                  amount: 3
                  pes: 2
                  pe_mips: 60000
                  ram: 1024
                  size: 4000
                  bw: 1000
  paying_for_the_full_hour: false
  save_experiment: true
  base_log_dir: logs
  mode: train
  vm_allocation_policy: rl
  enable_autoencoder_observation: false
  freeze_inactive_input_layer_weights: true
  algorithm: MaskablePPO
  max_hosts: 32
  max_job_pes: 8
  job_trace_filename: three_60max_8maxcores.csv
  timesteps: 2048
  n_rollout_steps: 2048
  reward_job_wait_coef: 0.25
  reward_running_vm_cores_coef: 0.25
  reward_unutilized_vm_cores_coef: 0.25
  reward_invalid_coef: 0.25

experiment_1:
    experiment_type_dir: testing
    experiment_name: test1