experiment_1:
  algorithm: MaskablePPO
  use_lstm: true
  embedding_latent_dim: 64
  embedding_size: 64
  convert_obs_to_embedding: true
  normalize_continuous_obs: false
  experiment_name: without_norm

experiment_2:
  algorithm: MaskablePPO
  use_lstm: false
  embedding_latent_dim: 64
  embedding_size: 64
  convert_obs_to_embedding: true
  normalize_continuous_obs: true
  experiment_name: without_lstm

experiment_3:
  algorithm: PPO
  use_lstm: true
  embedding_latent_dim: 64
  embedding_size: 64
  convert_obs_to_embedding: true
  normalize_continuous_obs: true
  experiment_name: without_mask