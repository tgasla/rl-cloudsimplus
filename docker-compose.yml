services:
  gateway:
    profiles: ["py4j"]
    image: gateway:2.0.0
    container_name: gateway
    volumes:
      - ./logs:/app/logs

  manager: &cpu
    profiles: [""]
    image: manager:0.11
    # container_name: manager # disabled to allow multiple instances
    environment: # passing defaults to avoid warnings
      - EXPERIMENT_ID=${EXPERIMENT_ID:-""}
      - RUN_MODE=${RUN_MODE:-""}
      - NUM_EXPERIMENTS=${NUM_EXPERIMENTS:-""}
      - CUBLAS_WORKSPACE_CONFIG=:4096:8
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    build:
      context: .
      dockerfile: rl-manager/Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    # For gRPC vectorized mode: mount the JAR so Python workers can spawn JVMs
    # For Py4J legacy mode: depends on gateway service
    volumes:
      - ./config.yml:/mgr/config.yml
      - ./rl-manager/mnt:/mgr/mnt
      - ./logs:/mgr/logs
      - ./cloudsimplus-gateway/build/libs:/app/cloudsimplus-gateway/build/libs:ro
      - /run/docker.sock:/run/docker.sock:ro
    command: python mnt/entrypoint.py

  manager-cuda:
    <<: *cpu
    profiles: ["cuda"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
